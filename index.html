    <style>
        :root {

            overflow-x: hidden;

        }

        .lang-wrapper {

            top: 0px;
            right: 0px;
        }

            background: var(--bg-muted);

            border-radius: 8px;

            font-weight: 700;

        }

        .substance-pill {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 16px;

        .hub-title {

            font-size: 32px;
            margin-bottom: 12px;

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #F1F5F9;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);

            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);

        .section-header {

            align-items: center;

        }

            font-size: 20px;

        }

        .article-card {
            background: var(--bg-muted);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;

        .article-card:hover {

        .card-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; display: block; }
        .card-meta { font-size: 11px; color: var(--text-meta); font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .meta-type { background: #E2E8F0; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: 700; font-size: 9px; }

        /* --- Reader View --- */

            inset: 0;

            min-height: 100vh;

        .reader-nav {
            position: sticky;

            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);

            display: flex;

            height: 40px;
            display: flex;

            justify-content: center;

            transition: all 0.2s;
        }
        .back-btn:hover { background: #E2E8F0; }

        .read-progress-outer {
            flex: 1;
            height: 4px;
            background: #F1F5F9;

            overflow: hidden;

        }

            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s linear;

            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;

        }

        .reader-title {
            font-family: 'DM Serif Display', serif;
            font-size: 36px;
            line-height: 1.2;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .reader-meta-row {
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
            display: flex;
            gap: 12px;
            font-size: 13px;

            color: var(--text-meta);
        }

        .rt-body p {
            font-size: 18px;
            line-height: 1.8;
            color: #1E293B;
            margin-bottom: 24px;
        }

        /* --- Footer Section --- */
        .reader-footer {
            margin-top: 60px;
            padding: 32px 0;
            border-top: 2px solid var(--bg-muted);
            text-align: center;

        .completion-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 8px 24px rgba(91, 79, 232, 0.2);
        }
        .completion-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(91, 79, 232, 0.3); }
        .completion-btn.done { background: var(--green); box-shadow: none; pointer-events: none; }

        .feedback-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .fb-btn {
            flex: 1;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
            color: var(--text-meta);
        }
        .fb-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg-muted); }

        /* --- Toast --- */
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-dark);
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 12px 32px rgba(0,0,0,0.2);
        }
        #toast.visible { transform: translateX(-50%) translateY(0); }
        
        @media (max-width: 480px) {
            .reader-title { font-size: 30px; }
            .rt-body p { font-size: 16px; }
        }

    <script>
        let DATA = {
            sections: [
                {
                    num: '01',
                    title: 'How Stimulants Work',
                    articles: [
                        { id: 's1', title: 'The Brain on Cocaine and Meth', time: '5 min', type: 'Article', content: '<p>Stimulants like cocaine and methamphetamine work by dramatically increasing the levels of dopamine in the brain\'s reward circuits. While cocaine does this by blocking the reabsorption of dopamine, methamphetamine goes a step further by both blocking reabsorption and stimulating an even more massive release. This creates an intense, immediate rush of energy, confidence, and euphoria. However, this artificial surge is extremely taxing on the brain. Your brain responds by shutting down its own dopamine receptors to protect itself from the overwhelming stimulation. This depletion is why the \'high\' is inevitably followed by a \'crash\'—a state of profound exhaustion, depression, and irritability. Over time, regular use can lead to long-term changes in the brain\'s structure and function, affecting memory, decision-making, and emotional regulation. Understanding this cycle of peak and crash is essential for recovery. It helps you recognize that the intense lows you feel are not a reflection of your personality, but a biological consequence of the drug\'s impact on your neurochemistry. As you quit, your brain will begin the slow process of restoring its natural dopamine balance, allowing you to eventually find genuine energy and joy in life without the need for stimulants.</p>' },
                        { id: 's2', title: 'Adderall Misuse — When Prescribed Becomes Problematic', time: '6 min', type: 'Article', content: '<p>Adderall and other prescription stimulants are highly effective for treating ADHD, but they carry a high potential for misuse and dependency. Misuse occurs when the medication is taken in higher doses than prescribed, taken by someone without a prescription, or used for purposes other than intended—such as for studying or weight loss. Because these medications are \'prescribed,\' many people mistakenly believe they are inherently safe. However, in high doses, they can have effects similar to other powerful stimulants, including increased heart rate, elevated blood pressure, and a high risk of addiction. Dependency often develops subtly; you might find yourself needing the medication to feel \'sharp\' or to manage your daily tasks. Over time, you may find it impossible to function without it, experiencing significant withdrawal symptoms like fatigue and depression when you stop. Recognizing the transition from therapeutic use to problematic misuse is a vital step. If you are seeking refills early, using the medication to cope with stress, or feeling anxious about your supply, these are signals that a dependency has formed. Acknowledging this reality is the first step toward working with a healthcare professional to safely manage your health and build a life free from the need for stimulant misuse.</p>' },
                        { id: 's3', title: 'The Crash Cycle Explained', time: '5 min', type: 'Article', content: '<p>The crash cycle is a defining feature of stimulant use, representing the period immediately following a binge or a period of high consumption. As the effects of the drug wear off, the brain\'s dopamine levels plummet, leading to a state of profound physical and emotional depletion. This crash is characterized by extreme fatigue, increased appetite, and a deep, pervasive sense of depression or \'flatness.\' You may also experience intense irritability, anxiety, and an overwhelming craving for more of the substance to escape the discomfort. This cycle is what maintains the addiction; the pain of the crash drives the user to seek another high, creating a self-perpetuating loop. Understanding the crash as a physiological event is crucial for navigating early recovery. It is a sign that your brain is attempting to recalibrate after being pushed to its limits. During this time, your focus should be on rest, hydration, and nutrition. Recognizing that the intense feelings of despair are temporary and biologically driven can help you resist the urge to use again. Every time you move through a crash without returning to stimulants, you are breaking the cycle and allowing your brain to take another step toward natural balance and lasting recovery.</p>' },
                        { id: 's4', title: 'Stimulants and Cardiovascular Risk', time: '7 min', type: 'Article', content: '<p>One of the most significant and immediate dangers of stimulant use is the strain it places on the cardiovascular system. Stimulants work by activating the body\'s \'fight or flight\' response, causing a sharp increase in heart rate and blood pressure. While this creates a temporary sense of energy, it also forces the heart to work much harder and constricts the blood vessels. This can lead to a variety of serious health issues, including heart palpitations, irregular heartbeats (arrhythmias), and a significantly increased risk of heart attacks and strokes, even in young and otherwise healthy individuals. Long-term use can cause permanent damage to the heart muscle and the lining of the blood vessels. It is also common for stimulants to be used in combination with other substances like alcohol, which further complicates and increases the cardiovascular risk. If you experience chest pain, shortness of breath, or a racing heart that won\'t slow down, it is vital to seek medical attention immediately. Understanding these risks is a powerful motivator for choosing a stimulant-free life. By quitting, you are immediately reducing the strain on your heart and allowing your cardiovascular system to begin the work of healing and protecting your long-term health.</p>' },
                        { id: 's5', title: 'How Dependency Develops', time: '7 min', type: 'Assessment', content: '<p>Dependency on stimulants develops through a combination of biological changes in the brain and the reinforcement of behavioral patterns. It starts with the brain\'s rapid adaptation to the massive dopamine surges caused by the drug. To maintain balance, the brain reduces its natural production of dopamine and the number of available receptors. This means that over time, you need a higher dose of stimulants just to feel \'normal\'—a state known as tolerance. At the same time, the brain\'s reward system becomes highly sensitized to any cues associated with the drug—certain people, places, or even times of day—creating powerful, automatic carvings. The behavioral part of dependency is the integration of the drug into your life as a primary coping mechanism for stress, fatigue, or social situations. You begin to believe that you \'need\' the substance to function or to be the person you want to be. This \'triple threat\' of physical tolerance, heightened cravings, and psychological reliance is what makes stimulant dependency so powerful. Recognizing these stages is not a sign of failure, but a way to understand the challenge you are facing. With the right support and a commitment to change, you can reverse these patterns and build a life of genuine health and independence.</p>' }
                    ]
                },
                {
                    num: '02',
                    title: 'Coming Down Safely',
                    articles: [
                        { id: 's6', title: 'Managing the Crash Safely', time: '6 min', type: 'Activity', content: '<p>Managing the crash after stimulant use is about prioritizing physical safety and emotional stability during a period of extreme vulnerability. The first step is to ensure you are in a safe, quiet environment where you can rest. Your body and brain are profoundly depleted and need time to begin the recovery process. Hydration is essential; drink plenty of water and electrolyte-rich fluids to help your system rebalance. Nutrition is also vital, as your appetite often returns with a vengeance during a crash; focus on healthy, protein-rich foods that provide sustained energy. Emotionally, be prepared for intense feelings of depression, anxiety, and irritability. Remind yourself constantly that these feelings are a temporary, biological result of the crash and that they will pass. Avoid making any major life decisions or engaging in high-conflict conversations during this time. Contacting a supportive friend, family member, or a professional who understands stimulant recovery can provide a vital layer of safety and accountability. If you experience severe symptoms like hallucinations, paranoid thoughts, or suicidal ideation, seek medical help immediately. Managing the crash safely is an act of self-care and the first step toward breaking the cycle of use.</p>' },
                        { id: 's7', title: 'Sleep Recovery After Stimulant Use', time: '6 min', type: 'Activity', content: '<p>Sleep is often the first thing sacrificed in the cycle of stimulant use, and rebuilding a healthy sleep pattern is one of the most important parts of recovery. Stimulants interfere with the brain\'s natural sleep-wake cycle, leading to periods of insomnia followed by long \'crash sleeps\' that are not restorative. When you stop using, your sleep architecture begins the slow process of repair. You might first experience a period of excessive sleepiness as your body tries to recover from accumulated fatigue. This is followed by a period where falling and staying asleep can be difficult, as your nervous system remains in a state of high alert. To support your sleep recovery, establish a consistent wake time and a relaxing bedtime routine. Avoid caffeine and screens—phones, tablets, and TVs—for at least an hour before bed. Ensure your bedroom is cool, dark, and used only for sleep. If you find yourself lying awake and frustrated, get out of bed and do a quiet activity in low light until you feel genuinely sleepy. While it may take several weeks for your sleep to become truly restorative, persisting with these healthy habits will allow your brain to return to its natural rhythm, giving you the energy and clarity you need for a lasting recovery.</p>' },
                        { id: 's8', title: 'Nutritional Support During Recovery', time: '6 min', type: 'Article', content: '<p>Stimulant use often leads to neglected nutrition, as the drug suppresses appetite and the focus remains on the next high. Rebuilding your health through proper nutrition is a foundational part of recovery. Your brain and body have been depleted of essential nutrients, particularly those needed for neurotransmitter production and cardiovascular health. Focus on a diet rich in high-quality proteins—like eggs, fish, and lean meats—which provide the amino acids your brain needs to rebuild its dopamine levels. Healthy fats, found in avocados, nuts, and olive oil, are essential for brain function and cell repair. Complex carbohydrates, such as whole grains and vegetables, provide steady energy and help stabilize your mood. It\'s also vital to stay well-hydrated throughout the day. You might find that your appetite returns with a vengeance in early recovery; instead of reaching for processed, high-sugar foods that lead to energy crashes, aim for balanced meals and snacks. Nutritional support is not just about physical health; it is a way to directly support your emotional stability and cognitive clarity. By giving your body the fuel it needs, you are creating a solid foundation for the hard work of recovery and building a future of genuine vitality and strength.</p>' },
                        { id: 's9', title: 'Mental Health in the Days After Use', time: '8 min', type: 'Article', content: '<p>The days following stimulant use are often marked by a significant \'emotional tax\' as your brain struggles to find its balance. You may experience a range of mental health challenges, including deep depression, intense anxiety, irritability, and a pervasive lack of motivation or pleasure—a condition known as anhedonia. It\'s important to understand that these feelings are a direct, biological result of the massive dopamine depletion caused by the drug. They are not a sign that you are naturally a depressed or anxious person, or that you are failing at recovery. These are temporary states that will gradually improve as your neurochemistry resets. To manage this period, be extremely patient and compassionate with yourself. Avoid self-criticism and isolation. Engaging in small, manageable activities that require focus can help quiet the anxious mind. Reaching out to a counselor or a support group provides a safe space to share these feelings with others who understand. If your depression feels overwhelming or if you have thoughts of self-harm, seek professional help immediately. Remember that the flatness and despair you feel today are not your permanent reality. With time and continued abstinence, your capacity for joy, motivation, and emotional stability will return.</p>' },
                        { id: 's10', title: 'Harm Reduction Basics', time: '7 min', type: 'Article', content: '<p>While the ultimate goal of recovery is total abstinence from stimulants, understanding harm reduction is a vital part of staying safe while you work toward that goal. Harm reduction is about minimizing the negative consequences of drug use for those who are not yet able or willing to stop. Basic strategies include never using alone—having someone present who can call for help if needed—and always having a plan for managing a crash. Staying hydrated and attempting to eat even small amounts can reduce some of the physical strain on your body. It\'s also important to be aware of the environment in which you use and to avoid high-risk situations where you are more likely to use more than intended. Understanding the risks of combining stimulants with other substances, particularly alcohol or other drugs, is essential for preventing overdose and cardiovascular events. Carrying contact information for local harm reduction services and emergency medical help is a simple but life-saving step. Harm reduction is not about condoning drug use; it\'s about valuing human life and providing the safety and support needed for someone to eventually choose a healthier path. Your safety matters, and taking even small steps to reduce risk is a powerful act of self-care on the journey toward recovery.</p>' }
                    ]
                },
                {
                    num: '03',
                    title: 'Long-term Recovery',
                    articles: [
                        { id: 's11', title: 'Breaking the Binge Pattern', time: '7 min', type: 'Activity', content: '<p>Many people who use stimulants find themselves caught in a \'binge and crash\' pattern—using the drug heavily over a period of days and then crashing for an equally long period. Breaking this pattern is often the most difficult first step in recovery. It requires a fundamental shift in how you view the substance and a commitment to interrupting the cycle as early as possible. Start by identifying the early warning signs that a binge is being planned—certain thoughts, feelings, or social cues that always lead to use. Once you recognize these triggers, you can develop a \'stop-gap\' plan. This might mean leaving a high-risk location, calling a support person immediately, or engaging in a pre-planned activity that is entirely unrelated to drug use. The goal is to create a pause between the urge and the action. It\'s also helpful to address the underlying reasons for the binge—whether it\'s an escape from stress, a way to handle loneliness, or a search for intense reward. Replacing the binge with a series of small, consistent healthy habits can help stabilize your neurochemistry and reduce the pull of the \'peak and crash.\' Every time you choose not to binge, you are weakening a powerful habit and building the self-regulation skills needed for a lasting recovery.</p>' },
                        { id: 's12', title: 'Rebuilding Dopamine Naturally', time: '8 min', type: 'Article', content: '<p>Stimulant use leaves the brain\'s dopamine system in a state of deep depletion, leading to a pervasive sense of flatness and a loss of pleasure in ordinary activities. Rebuilding your dopamine levels naturally is a slow but profoundly rewarding process. It involves engaging in activities that provide a genuine, sustainable sense of reward without the devastating crash of stimulants. Physical exercise is one of the most effective ways to boost dopamine and improve your mood; even a short daily walk or a yoga session can make a significant difference. Creative projects, whether it\'s cooking, painting, or writing, provide a natural sense of achievement and flow. Spending time in nature and fostering authentic social connections also stimulate the brain\'s reward centers in a healthy, balanced way. Goal setting—and the small, daily wins that come with it—is another powerful tool for rebuilding dopamine. Start with small, achievable goals and celebrate your success. It\'s important to be patient; your natural reward system won\'t reset overnight. You might feel \'flat\' for several weeks or even months, but this is a temporary phase. By consistently choosing natural sources of reward, you are helping your brain rediscover its capacity for joy and building a life of authentic fulfillment and strength.</p>' },
                        { id: 's13', title: 'Stimulants and Relationships', time: '8 min', type: 'Article', content: '<p>Stimulant use can have a devastating impact on relationships, often characterized by a loss of trust, increased conflict, and emotional withdrawal. The intense focus on obtaining and using the drug, combined with the volatility of the peak and crash cycle, leaves little room for the needs of others. To repair these relationships, you must first commit to your own stability and recovery. Genuine repair requires more than just an apology; it requires consistent, changed behavior over time. The currency of trust is reliability. By showing up when you say you will, being honest about your challenges, and staying present during interactions, you are slowly rebuilding the bridge to those you care about. It\'s also important to have honest conversations about the harm your use caused, giving the other person space to express their feelings without becoming defensive. Some relationships may have become too toxic or centered around use to be part of your new life, and identifying these is a painful but necessary part of recovery. For the ones you choose to keep, be patient; trust is built in drops and lost in buckets. As you heal, you will find that your connections become deeper and more authentic because they are based on who you really are, not on the person stimulants made you.</p>' },
                        { id: 's14', title: 'Cognitive Recovery — What to Expect', time: '7 min', type: 'Article', content: '<p>Long-term stimulant use can significantly impact cognitive functions like memory, attention, and decision-making. Cognitive recovery is the process of your brain repairing these functions as you move through sobriety. In the early weeks and months, you may experience \'brain fog\'—a sense of mental slowness, difficulty concentrating, and occasional memory lapses. It\'s important to understand that this is a normal part of the healing process. Your brain is essentially \'re-learning\' how to process information without the artificial stimulation of the drug. To support your cognitive recovery, engage in activities that challenge your mind in a gentle, supportive way—reading, puzzles, or learning a simple new skill. Maintaining a consistent sleep schedule and staying well-hydrated also directly support brain health. Physical exercise has been shown to improve cognitive function and even stimulate the growth of new neural pathways. Be patient with yourself; you won\'t feel \'mentally sharp\' every day. However, with continued abstinence and a focus on overall health, most people find their cognitive clarity returns significantly over the first year of recovery. You are not just \'quitting a drug\'; you are actively restoring your brain\'s capacity for clear thinking, focused attention, and wise decision-making.</p>' },
                        { id: 's15', title: 'Finding Energy Without Stimulants', time: '7 min', type: 'Article', content: '<p>One of the most common challenges in stimulant recovery is finding the energy and motivation to face the day without a chemical boost. In the beginning, you may feel profoundly fatigued and \'flat,\' as your body and brain recover from the extreme drain of use. Finding natural energy starts with the basics: consistent sleep, balanced nutrition, and regular physical activity. A steady morning routine, including a healthy breakfast and a short walk, can help signal to your body that it\'s time to wake up. It\'s also helpful to look at the sources of motivation in your life; finding tasks and goals that genuinely interest you can provide a natural sense of drive. Break large tasks into small, manageable steps to avoid feeling overwhelmed. Most importantly, give yourself permission to move at a slower pace in the early stages of recovery. You are not a \'failed\' version of your high-energy, stimulant-using self; you are a resilient human being building a sustainable and authentic foundation of strength. Over time, as your neurochemistry resets, you will discover a level of energy that is steady, reliable, and entirely your own. You are moving from a state of artificial intensity to a state of natural vitality, where you can face life with a clear head and a steady source of genuine power.</p>' }
                    ]
                }
            ]
        };





        let readArticles = new Set(JSON.parse(localStorage.getItem('read_stimulants') || '[]'));
        let currentArticleId = null;

        function init() {
            renderList();
            updateProgress();
            window.addEventListener('scroll', handleGlobalScroll);
        }

        function renderList() {
            const listEl = document.getElementById('content-list');
            let html = '';
            DATA.sections.forEach(sec => {
                html += `
                    <div class="section-header">
                        <span class="section-num">${sec.num}</span>
                        <span class="section-title">${sec.title}</span>
                    </div>
                `;
                sec.articles.forEach(art => {
                    const done = readArticles.has(art.id);
                    html += `
                        <div class="article-card ${done ? 'done' : ''}" onclick="openReader('${art.id}')">
                            <div class="card-icon">
                                ${done ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>' : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>'}
                            </div>
                            <div class="card-body">
                                <span class="card-title">${art.title}</span>
                                <div class="card-meta">
                                    <span>${art.time}</span>
                                    <span class="meta-type">${art.type}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });
            listEl.innerHTML = html;
        }

        function openReader(id) {
            let article;
            DATA.sections.forEach(s => {
                const found = s.articles.find(a => a.id === id);
                if (found) article = found;
            });
            if (!article) return;

            currentArticleId = id;
            document.getElementById('rt-title').textContent = article.title;
            document.getElementById('rt-time').textContent = article.time;
            document.getElementById('rt-type').textContent = article.type;
            document.getElementById('rt-content').innerHTML = article.content;
            document.getElementById('rt-eyebrow').textContent = article.type;

            const btn = document.getElementById('complete-btn');
            if (readArticles.has(id)) {
                btn.classList.add('done');
                btn.querySelector('span').textContent = 'Completed';
            } else {
                btn.classList.remove('done');
                btn.querySelector('span').textContent = 'Mark as Finished';
            }

            document.getElementById('reader-view').classList.add('active');
            document.getElementById('list-view').classList.add('hidden');
            document.body.scrollTop = 0;
            document.documentElement.scrollTop = 0;
            updateReadProgress();
        }

        function closeReader() {
            document.getElementById('reader-view').classList.remove('active');
            document.getElementById('list-view').classList.remove('hidden');
            currentArticleId = null;
            renderList();
        }

        function handleGlobalScroll() {
            if (currentArticleId) {
                updateReadProgress();
            }
        }

        function updateReadProgress() {
            const h = document.documentElement, 
                  b = document.body,
                  st = 'scrollTop',
                  sh = 'scrollHeight';
            const percent = (h[st] || b[st]) / ((h[sh] || b[sh]) - h.clientHeight) * 100;
            document.getElementById('read-progress-fill').style.width = Math.min(percent, 100) + '%';
        }

        function markComplete() {
            if (!currentArticleId) return;
            readArticles.add(currentArticleId);
            localStorage.setItem('read_stimulants', JSON.stringify([...readArticles]));
            
            const btn = document.getElementById('complete-btn');
            btn.classList.add('done');
            btn.querySelector('span').textContent = 'Completed';
            
            showToast("Lesson completed!");
            updateProgress();
        }

        function updateProgress() {
            const total = DATA.sections.reduce((acc, s) => acc + s.articles.length, 0);
            const pct = Math.round((readArticles.size / total) * 100);
            document.getElementById('main-progress').style.width = pct + '%';
            document.getElementById('prog-pct').textContent = pct + '%';
        }

        function showToast(txt) {
            const t = document.getElementById('toast');
            document.getElementById('toast-txt').textContent = txt;
            t.classList.add('visible');
            setTimeout(() => t.classList.remove('visible'), 3000);
        }

        // i18n Hook
        window.onTranslationsLoaded = (t) => {
            if (t.DATA) DATA = t.DATA;
            init();
        };

        // Fallback for English (where loader might not trigger hook if already loaded or not needed)
        setTimeout(() => {
            if (document.getElementById('content-list').innerHTML === '') {
                init();
            }
        }, 500);
    
    </script>
</body>
</html>
